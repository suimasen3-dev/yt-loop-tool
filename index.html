<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #0f0f0f; color: #f1f1f1; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .wrapper { background: #1a1a1a; padding: 20px; border-radius: 12px; max-width: 860px; width: 95%; margin-top: 10px; border: 1px solid #333; }
        .input-row { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; outline: none; font-size: 14px; }
        
        #player-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; margin-bottom: 5px; border-radius: 6px; overflow: hidden; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .trim-visualizer { width: 100%; height: 6px; background: #333; margin-bottom: 20px; border-radius: 3px; position: relative; overflow: hidden; }
        #trim-bar { position: absolute; height: 100%; background: #ff0000; left: 0; width: 0; transition: 0.3s; }

        .time-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #262626; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .time-item { display: flex; flex-direction: column; gap: 5px; }
        .time-item label { font-size: 11px; color: #888; }
        .time-ctrls { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .time-ctrls input { width: 95px; padding: 6px; border-radius: 4px; border: 1px solid #444; background: #0f0f0f; color: #fff; font-size: 13px; font-family: monospace; }
        
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: opacity 0.2s; white-space: nowrap; }
        button:hover { opacity: 0.8; }
        .btn-load { background: #cc0000; color: white; }
        .btn-paste { background: #444; color: white; }
        .btn-set { background: #3ea6ff; color: white; flex: 1; min-width: 60px; }
        .btn-jump { background: #555; color: white; }
        .btn-clear { background: #2a2a2a; color: #888; }
        .btn-reset-text { background: #2a2a2a; color: #ccc; font-size: 10px; }
        
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 15px; }
        .btn-nav { background: #333; color: #ccc; }
        
        .share-box { border-top: 1px solid #333; padding-top: 15px; text-align: center; }
        #output-url { width: 100%; padding: 8px; margin-top: 10px; background: #0f0f0f; border: 1px solid #333; color: #aaa; font-family: monospace; font-size: 11px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="input-row">
        <input type="text" id="v-url" placeholder="YouTubeのURLを貼り付け">
        <button class="btn-clear" onclick="document.getElementById('v-url').value=''">×</button>
        <button class="btn-paste" onclick="pstV()">貼り付け</button>
        <button class="btn-load" onclick="loadV()">読み込み</button>
    </div>

    <div id="player-box">
        <div id="player"></div>
    </div>
    
    <div class="trim-visualizer">
        <div id="trim-bar"></div>
    </div>

    <div class="time-panel">
        <div class="time-item">
            <label>開始地点</label>
            <div class="time-ctrls">
                <input type="text" id="t-start" value="00:00:00">
                <button class="btn-set" onclick="setT('start')">セット</button>
                <button class="btn-jump" onclick="jumpT('start')">飛ぶ</button>
                <button class="btn-reset-text" onclick="resetT('start')">Reset</button>
            </div>
        </div>
        <div class="time-item">
            <label>終了地点</label>
            <div class="time-ctrls">
                <input type="text" id="t-end" value="00:00:00">
                <button class="btn-set" onclick="setT('end')">セット</button>
                <button class="btn-jump" onclick="jumpT('end')">飛ぶ</button>
                <button class="btn-reset-text" onclick="resetT('end')">Reset</button>
            </div>
        </div>
    </div>

    <div class="nav-grid">
        <button class="btn-nav" onclick="sk(-60)">-1分</button>
        <button class="btn-nav" onclick="sk(-30)">-30秒</button>
        <button class="btn-nav" onclick="sk(-10)">-10秒</button>
        <button class="btn-nav" onclick="sk(-5)">-5秒</button>
        <button class="btn-nav" onclick="sk(-3)">-3秒</button>
        <button class="btn-nav" onclick="sk(3)">+3秒</button>
        <button class="btn-nav" onclick="sk(5)">+5秒</button>
        <button class="btn-nav" onclick="sk(10)">+10秒</button>
        <button class="btn-nav" onclick="sk(30)">+30秒</button>
        <button class="btn-nav" onclick="sk(60)">+1分</button>
    </div>

    <div class="share-box">
        <button class="btn-load" style="background: #333; width: 100%; height: 40px;" onclick="genUrl()">共有用URLを発行（クリップボードにコピー）</button>
        <input type="text" id="output-url" readonly placeholder="ここにURLが表示されます">
    </div>
</div>

<script>
    let p;
    let loop;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function fmt(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        return [h, m, sec].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function toSec(str) {
        const parts = str.split(':').map(Number);
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        return parts[0] || 0;
    }

    async function pstV() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('v-url').value = text;
        } catch (err) { alert('貼り付け許可が必要です'); }
    }

    function onYouTubeIframeAPIReady() {
        const u = new URLSearchParams(window.location.search);
        const v = u.get('v');
        if (v) {
            document.getElementById('t-start').value = fmt(u.get('s') || 0);
            document.getElementById('t-end').value = fmt(u.get('e') || 0);
            document.getElementById('v-url').value = "https://www.youtube.com/watch?v=" + v;
            init(v);
        }
    }

    function parseId(url) {
        if (!url) return null;
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length === 11) ? m[2] : (url.length === 11 ? url : null);
    }

    function init(vid) {
        if (p) p.destroy();
        p = new YT.Player('player', {
            videoId: vid,
            playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'mute': 0 },
            events: {
                'onReady': (e) => {
                    const s = toSec(document.getElementById('t-start').value);
                    if (s > 0) e.target.seekTo(s);
                    updateTrimBar();
                    runLoop();
                },
                'onStateChange': (e) => {
                    if (e.data == YT.PlayerState.PLAYING) runLoop();
                }
            }
        });
    }

    function loadV() {
        const id = parseId(document.getElementById('v-url').value);
        if (id) {
            // URL読み込み時に各項目をリセット
            document.getElementById('t-start').value = "00:00:00";
            document.getElementById('t-end').value = "00:00:00";
            document.getElementById('output-url').value = "";
            updateTrimBar();
            init(id);
        }
    }

    function setT(t) {
        if (!p || typeof p.getCurrentTime !== 'function') return;
        document.getElementById('t-' + t).value = fmt(p.getCurrentTime());
        updateTrimBar();
    }

    function resetT(t) { 
        document.getElementById('t-' + t).value = "00:00:00";
        updateTrimBar();
    }

    function jumpT(t) {
        if (!p) return;
        let v = toSec(document.getElementById('t-' + t).value);
        if (t === 'end' && v > 2) v -= 2;
        p.seekTo(v, true);
    }

    function sk(s) { if (p) p.seekTo(p.getCurrentTime() + s, true); }

    function updateTrimBar() {
        if (!p || typeof p.getDuration !== 'function') return;
        const total = p.getDuration();
        const s = toSec(document.getElementById('t-start').value);
        const e = toSec(document.getElementById('t-end').value);
        const bar = document.getElementById('trim-bar');
        
        if (e > s) {
            const left = (s / total) * 100;
            const width = ((e - s) / total) * 100;
            bar.style.left = left + "%";
            bar.style.width = width + "%";
        } else {
            bar.style.width = "0%";
        }
    }

    function runLoop() {
        if (loop) clearInterval(loop);
        loop = setInterval(() => {
            if (!p || p.getPlayerState() !== 1) return;
            const s = toSec(document.getElementById('t-start').value);
            const e = toSec(document.getElementById('t-end').value);
            const n = p.getCurrentTime();
            if (e > s && n >= e) p.seekTo(s);
            if (e > s && n < s - 1) p.seekTo(s); 
        }, 500);
    }

    function genUrl() {
        const id = parseId(document.getElementById('v-url').value);
        if (!id) return;
        const s = toSec(document.getElementById('t-start').value);
        const e = toSec(document.getElementById('t-end').value);
        const base = window.location.href.split('?')[0];
        const full = `${base}?v=${id}&s=${s}&e=${e}`;
        const out = document.getElementById('output-url');
        out.value = full;
        out.select();
        document.execCommand('copy');
        alert("共有用URLをコピーしました！");
    }
</script>
</body>
</html>
