<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player - Smart Scrollbar Update</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: #0f0f0f; color: #f1f1f1; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; }
        .wrapper { background: #1a1a1a; padding: 12px 15px; border-radius: 12px; max-width: 900px; width: 96%; border: 1px solid #333; margin-top: 5px; box-sizing: border-box; }
        
        #player-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; margin-bottom: 8px; border-radius: 6px; overflow: hidden; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .status-line { width: 100%; text-align: center; margin-bottom: 2px; height: 16px; }
        #fixed-time { font-family: monospace; font-size: 14px; color: #3ea6ff; font-weight: bold; }

        .full-nav-bar { width: 100%; height: 6px; background: #333; position: relative; margin-bottom: 12px; cursor: pointer; border-radius: 3px; }
        #full-play-head { position: absolute; height: 10px; width: 2px; background: #fff; top: -2px; left: 0; z-index: 2; }
        #full-trim-range { position: absolute; height: 100%; background: #ff0000; opacity: 0.3; left: 0; width: 0; z-index: 1; }

        .zoom-ctrls { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; font-size: 11px; color: #aaa; }
        .zoom-ctrls button { padding: 2px 10px; background: #444; color: #fff; border-radius: 4px; font-weight: bold; }

        .zoom-viewport { width: 100%; height: 35px; background: #222; border: 1px solid #444; position: relative; overflow-x: scroll; overflow-y: hidden; margin-bottom: 0px; }
        .zoom-viewport::-webkit-scrollbar { display: none; }
        
        .zoom-content { height: 100%; position: relative; min-width: 100%; }
        #zoom-trim-bar { position: absolute; height: 100%; background: #ff0000; opacity: 0.2; pointer-events: none; }
        #zoom-play-head { position: absolute; height: 100%; width: 2px; background: #fff; z-index: 5; pointer-events: none; }
        .trim-handle { position: absolute; height: 100%; width: 12px; top: 0; z-index: 10; cursor: ew-resize; display: flex; justify-content: center; }
        .trim-handle::after { content: ''; width: 2px; height: 100%; background: #3ea6ff; box-shadow: 0 0 6px #3ea6ff; }

        /* スクロールバーの色を動的に変更するための変数設定 */
        :root { --scrollbar-thumb: transparent; }

        .scroll-container { width: 100%; height: 12px; overflow-x: scroll; overflow-y: hidden; margin-bottom: 12px; display: block; transition: 0.3s; }
        /* スクロールバーのカスタマイズ（PCのみ） */
        .scroll-container::-webkit-scrollbar { height: 8px; background: transparent; }
        .scroll-container::-webkit-scrollbar-thumb { 
            background: var(--scrollbar-thumb); 
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        .scroll-dummy { height: 1px; }

        button { border: none; cursor: pointer; transition: 0.2s; font-weight: bold; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        button:hover { opacity: 0.8; }

        .playback-ctrls { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 10px; width: 100%; }
        .btn-play { background: #fff; color: #000; width: 160px; height: 44px; border-radius: 22px; font-size: 16px; font-weight: bold; flex-direction: column; }
        .btn-speed { background: #333; color: #3ea6ff; height: 44px; padding: 0 12px; border-radius: 6px; font-size: 14px; min-width: 70px; }
        .btn-frame { background: #444; color: #fff; height: 44px; padding: 0 14px; border-radius: 4px; font-size: 14px; }

        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 12px; }
        .btn-nav { background: #333; color: #ccc; padding: 12px 0; font-size: 18px; border-radius: 4px; }

        .time-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #262626; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .time-item { display: flex; align-items: center; gap: 8px; }
        .time-item label { font-size: 13px; color: #888; min-width: 55px; font-weight: bold; }
        .time-ctrls { display: flex; gap: 4px; align-items: center; flex: 1; }
        .time-ctrls input { width: 90px; height: 36px; padding: 0 6px; background: #0f0f0f; color: #fff; border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 14px; box-sizing: border-box; }
        
        .btn-set { background: #3ea6ff; color: white; height: 36px; font-size: 13px; border-radius: 4px; max-width: 60px; flex: 1; }
        .btn-jump { background: #555; color: white; height: 36px; padding: 0 12px; font-size: 13px; border-radius: 4px; }
        .btn-reset-text { background: #2a2a2a; color: #ccc; height: 36px; font-size: 12px; padding: 0 10px; border-radius: 4px; }

        .footer-area { border-top: 1px solid #333; padding-top: 12px; margin-top: 5px; width: 100%; }
        .input-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; width: 100%; }
        #v-url { flex: 1; min-width: 0; height: 40px; padding: 0 10px; background: #2a2a2a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 14px; }
        .btn-sub { background: #444; color: white; height: 40px; padding: 0 16px; border-radius: 6px; font-size: 14px; }
        .btn-main { background: #cc0000; color: white; height: 40px; padding: 0 16px; border-radius: 6px; font-size: 14px; }
        .btn-clear-text { background: #2a2a2a; color: #888; height: 40px; padding: 0 14px; font-size: 14px; border-radius: 6px; }

        #output-url { width: 100%; padding: 8px; margin-top: 8px; background: #0f0f0f; border: 1px solid #333; color: #00ff41; font-family: monospace; font-size: 11px; border-radius: 4px; box-sizing: border-box; }

        @media (max-width: 600px) {
            .playback-ctrls { gap: 4px; }
            .btn-play { width: 130px; height: 38px; font-size: 11px; border-radius: 19px; }
            .btn-speed { font-size: 10px; min-width: 45px; height: 38px; padding: 0 4px; }
            .btn-frame { font-size: 10px; height: 38px; padding: 0 8px; }
            .btn-nav { font-size: 10px; padding: 7px 0; }
            .time-panel { grid-template-columns: 1fr; }
            .time-item label { font-size: 11px; min-width: 25px; }
            .time-ctrls input { font-size: 12px; max-width: 85px; height: 32px; }
            .btn-set, .btn-jump, .btn-reset-text { font-size: 10px; height: 32px; max-width: none; }
            .btn-main, .btn-sub, .btn-clear-text { font-size: 12px; height: 36px; padding: 0 10px; }
            #v-url { height: 36px; }
            .zoom-viewport { overflow-x: auto; margin-bottom: 12px; }
            .zoom-viewport::-webkit-scrollbar { display: block; height: 4px; }
            .scroll-container { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="player-box"><div id="player"></div></div>
    <div class="status-line"><span id="fixed-time">00:00:00</span></div>

    <div class="full-nav-bar" onclick="seekFull(event)">
        <div id="full-trim-range"></div>
        <div id="full-play-head"></div>
    </div>

    <div class="zoom-ctrls">
        <span>ズーム:</span>
        <button onclick="changeZoom(-5)">－</button>
        <input type="range" id="zoom-slider" min="1" max="100" value="1" oninput="updateZoom()" style="width: 100px;">
        <button onclick="changeZoom(5)">＋</button>
        <span id="zoom-val">1x</span>
    </div>

    <div class="zoom-viewport" id="z-viewport" onmousedown="seekZoom(event)">
        <div class="zoom-content" id="z-content">
            <div id="zoom-trim-bar"></div>
            <div id="zoom-play-head"></div>
            <div class="trim-handle" id="h-start" onmousedown="dragH(event, 'start')"></div>
            <div class="trim-handle" id="h-end" onmousedown="dragH(event, 'end')"></div>
        </div>
    </div>

    <div class="scroll-container" id="scroll-bar-container" onscroll="syncView(this)">
        <div class="scroll-dummy" id="scroll-bar-dummy"></div>
    </div>

    <div class="playback-ctrls">
        <button class="btn-frame" onclick="step(-0.033)">◁1コマ</button>
        <button class="btn-speed" id="speed-down-btn" onclick="changeSpeed(-0.25)">速度▼</button>
        <button class="btn-play" id="play-btn" onclick="togglePlay()">
            <span id="pc-play-text">再生 / 一時停止</span>
            <span id="sp-play-text" style="display:none;">再生 / 停止</span>
            <small id="speed-display">1.00x</small>
        </button>
        <button class="btn-speed" id="speed-up-btn" onclick="changeSpeed(0.25)">速度▲</button>
        <button class="btn-frame" onclick="step(0.033)">1コマ▷</button>
    </div>

    <div class="nav-grid">
        <button class="btn-nav" onclick="sk(-60)">-1分</button>
        <button class="btn-nav" onclick="sk(-30)">-30秒</button>
        <button class="btn-nav" onclick="sk(-10)">-10秒</button>
        <button class="btn-nav" onclick="sk(-5)">-5秒</button>
        <button class="btn-nav" onclick="sk(-3)">-3秒</button>
        <button class="btn-nav" onclick="sk(60)">+1分</button>
        <button class="btn-nav" onclick="sk(30)">+30秒</button>
        <button class="btn-nav" onclick="sk(10)">+10秒</button>
        <button class="btn-nav" onclick="sk(5)">+5秒</button>
        <button class="btn-nav" onclick="sk(3)">+3秒</button>
    </div>

    <div class="time-panel">
        <div class="time-item">
            <label id="start-label">開始地点</label>
            <div class="time-ctrls">
                <input type="text" id="t-start" value="00:00:00">
                <button class="btn-set" onclick="setT('start')">SET</button>
                <button class="btn-jump" onclick="jumpT('start')">飛ぶ</button>
                <button class="btn-reset-text" onclick="resetT('start')">RESET</button>
            </div>
        </div>
        <div class="time-item">
            <label id="end-label">終了地点</label>
            <div class="time-ctrls">
                <input type="text" id="t-end" value="00:00:00">
                <button class="btn-set" onclick="setT('end')">SET</button>
                <button class="btn-jump" onclick="jumpT('end')">飛ぶ</button>
                <button class="btn-reset-text" onclick="resetT('end')">RESET</button>
            </div>
        </div>
    </div>

    <div class="footer-area">
        <div class="input-row">
            <input type="text" id="v-url" placeholder="YouTube URL貼り付け">
            <button class="btn-sub" onclick="pstV()">貼付</button>
            <button class="btn-main" onclick="loadV()">読込</button>
            <button class="btn-clear-text" onclick="document.getElementById('v-url').value=''">Clear</button>
        </div>
        <button class="btn-nav" style="width:100%; background:#333; height:40px; font-size:14px; padding:0;" onclick="genUrl()">共有用URLを発行（コピー）</button>
        <input type="text" id="output-url" readonly placeholder="ここに発行されます">
    </div>
</div>

<script>
    let p, loop, zoom = 1, currentSpeed = 1;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function focusP() { const f = document.getElementById('player'); if(f) f.focus(); }
    function fmt(s) {
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        return [h,m,sec].map(v=>v.toString().padStart(2,'0')).join(':');
    }
    function toSec(str) {
        const parts = str.split(':').map(Number);
        return (parts[0]||0)*3600 + (parts[1]||0)*60 + (parts[2]||0);
    }

    function adjustLabels() {
        const isMobile = window.innerWidth <= 600;
        document.getElementById('pc-play-text').style.display = isMobile ? 'none' : 'inline';
        document.getElementById('sp-play-text').style.display = isMobile ? 'inline' : 'none';
        document.getElementById('speed-down-btn').innerText = isMobile ? '▼速' : '速度▼';
        document.getElementById('speed-up-btn').innerText = isMobile ? '▲速' : '速度▲';
        document.getElementById('start-label').innerText = isMobile ? '開始' : '開始地点';
        document.getElementById('end-label').innerText = isMobile ? '終了' : '終了地点';
    }
    window.addEventListener('resize', adjustLabels);
    window.addEventListener('DOMContentLoaded', adjustLabels);

    async function pstV() {
        try { const t = await navigator.clipboard.readText(); document.getElementById('v-url').value = t; } catch(e){}
        focusP();
    }

    function onYouTubeIframeAPIReady() {
        const u = new URLSearchParams(window.location.search), v = u.get('v');
        if (v) {
            document.getElementById('t-start').value = fmt(u.get('s')||0);
            document.getElementById('t-end').value = fmt(u.get('e')||0);
            document.getElementById('v-url').value = "https://www.youtube.com/watch?v=" + v;
            init(v);
        }
    }

    function init(vid) {
        if (p) p.destroy();
        p = new YT.Player('player', {
            videoId: vid,
            playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
            events: { 
                'onReady': () => { 
                    updateUI(); 
                    runLoop(); 
                    p.setPlaybackRate(currentSpeed);
                } 
            }
        });
    }

    function loadV() {
        const url = document.getElementById('v-url').value;
        const id = url.match(/(?:v=|\/v\/|youtu.be\/|shorts\/|live\/)([^#\&\?]*)/)?.[1];
        if (id) {
            document.getElementById('t-start').value = "00:00:00";
            document.getElementById('t-end').value = "00:00:00";
            updateUI();
            init(id);
        }
    }

    function changeSpeed(delta) {
        if (!p || !p.setPlaybackRate) return;
        currentSpeed = Math.max(0.25, Math.min(2, currentSpeed + delta));
        p.setPlaybackRate(currentSpeed);
        document.getElementById('speed-display').innerText = currentSpeed.toFixed(2) + "x";
        focusP();
    }

    function updateZoom() {
        zoom = document.getElementById('zoom-slider').value;
        document.getElementById('zoom-val').innerText = zoom + "x";
        const contentWidth = (zoom * 100);
        document.getElementById('z-content').style.width = contentWidth + "%";
        document.getElementById('scroll-bar-dummy').style.width = contentWidth + "%";
        
        // ズーム倍率によってスクロールバーの色を変更
        const root = document.documentElement;
        if (zoom > 1) {
            root.style.setProperty('--scrollbar-thumb', '#555');
        } else {
            root.style.setProperty('--scrollbar-thumb', 'transparent');
        }
        
        updateUI();
    }

    function changeZoom(d) {
        const s = document.getElementById('zoom-slider');
        s.value = Math.max(1, Math.min(100, parseInt(s.value) + d));
        updateZoom();
    }

    function syncView(scroller) {
        const viewport = document.getElementById('z-viewport');
        viewport.scrollLeft = scroller.scrollLeft;
    }

    function updateUI() {
        if (!p || !p.getDuration) return;
        const total = p.getDuration(), s = toSec(document.getElementById('t-start').value), e = toSec(document.getElementById('t-end').value), n = p.getCurrentTime();
        
        document.getElementById('full-play-head').style.left = (n/total*100) + "%";
        const fr = document.getElementById('full-trim-range');
        if (e > s) { fr.style.left = (s/total*100) + "%"; fr.style.width = ((e-s)/total*100) + "%"; } else { fr.style.width = "0%"; }
        
        document.getElementById('zoom-play-head').style.left = (n/total*100) + "%";
        document.getElementById('h-start').style.left = (s/total*100) + "%";
        document.getElementById('h-end').style.left = (e/total*100) + "%";
        const zr = document.getElementById('zoom-trim-bar');
        if (e > s) { zr.style.left = (s/total*100) + "%"; zr.style.width = ((e-s)/total*100) + "%"; } else { zr.style.width = "0%"; }
    }

    function seekFull(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        p.seekTo(p.getDuration() * (e.clientX - rect.left) / rect.width);
        focusP();
    }

    function seekZoom(e) {
        if (e.target.classList.contains('trim-handle')) return;
        const rect = document.getElementById('z-content').getBoundingClientRect();
        p.seekTo(p.getDuration() * (e.clientX - rect.left) / rect.width);
        focusP();
    }

    function dragH(e, type) {
        e.stopPropagation();
        const content = document.getElementById('z-content'), total = p.getDuration();
        const onMove = (me) => {
            const rect = content.getBoundingClientRect();
            const sec = total * Math.max(0, Math.min(1, (me.clientX - rect.left) / rect.width));
            document.getElementById('t-' + type).value = fmt(sec);
            updateUI();
        };
        const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); focusP(); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    }

    function runLoop() {
        if (loop) clearInterval(loop);
        loop = setInterval(() => {
            if (!p || !p.getCurrentTime) return;
            const s = toSec(document.getElementById('t-start').value), e = toSec(document.getElementById('t-end').value), n = p.getCurrentTime();
            document.getElementById('fixed-time').innerText = fmt(n);
            updateUI();
            
            if (zoom > 1 && p.getPlayerState() === 1) {
                const vp = document.getElementById('z-viewport'), head = document.getElementById('zoom-play-head');
                const scrollPos = head.offsetLeft - vp.clientWidth / 2;
                vp.scrollLeft = scrollPos;
                document.getElementById('scroll-bar-container').scrollLeft = scrollPos;
            }
            if (p.getPlayerState() === 1 && e > s && (n >= e || n < s - 1)) p.seekTo(s);
        }, 100);
    }

    function togglePlay() { p.getPlayerState()==1 ? p.pauseVideo() : p.playVideo(); focusP(); }
    function step(s) { p.pauseVideo(); p.seekTo(p.getCurrentTime()+s, true); focusP(); }
    function sk(s) { p.seekTo(p.getCurrentTime()+s, true); focusP(); }
    function setT(t) { document.getElementById('t-'+t).value = fmt(p.getCurrentTime()); updateUI(); focusP(); }
    function resetT(t) { document.getElementById('t-'+t).value = "00:00:00"; updateUI(); focusP(); }
    function jumpT(t) { p.seekTo(toSec(document.getElementById('t-'+t).value), true); focusP(); }

    function genUrl() {
        const id = p.getVideoData().video_id, s = toSec(document.getElementById('t-start').value), e = toSec(document.getElementById('t-end').value);
        const url = `${window.location.href.split('?')[0]}?v=${id}&s=${s}&e=${e}`;
        document.getElementById('output-url').value = url;
        navigator.clipboard.writeText(url); alert("コピーしました！");
        focusP();
    }
</script>
</body>
</html>
